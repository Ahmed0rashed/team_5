apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      component: backend
  template:
    metadata:
      labels:
        component: backend
    spec:
      containers:
        - name: backend
          image: mohammededris/class-track-backend
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: backend-secrets
          env:
            - name: NODE_ENV
              value: "development"
            - name: PORT
              value: "5000"
            - name: HOST
              value: "localhost"
            - name: JWT_EXPIRES_IN
              value: "7d"
            - name: BCRYPT_SALT_ROUNDS
              value: "12"
            - name: CORS_ORIGINS
              value: "http://localhost:3000,http://localhost:5173"
            - name: RATE_LIMIT_WINDOW_MS
              value: "900000"
            - name: RATE_LIMIT_MAX_REQUESTS
              value: "100"
            - name: EMAIL_HOST
              value: "smtp.gmail.com"
            - name: EMAIL_PORT
              value: "587"
            - name: EMAIL_USER
              value: "classtrack123@gmail.com"
            - name: EMAIL_FROM
              value: "ClassTrack <classtrack123@gmail.com>"
